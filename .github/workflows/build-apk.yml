name: Cloud APK Compiler

on:
  push:
    tags:
      - 'v*' # Triggers the build whenever you push a tag like v1.0, v1.0.1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the runner permission to create a release

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # or 'temurin'
          java-version: '21'
          
      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Install Dependencies & Build Web Layer
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npm run build

      - name: Capacitor Sync
        run: |
          npx capacitor sync android

      - name: Compile Debug APK via Gradle
        id: gradle_build
        run: |
          # Dynamically locate the directory containing gradlew
          GRADLE_DIR=$(dirname $(find . -name gradlew | head -n 1))
          echo "Gradle directory found at: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          
          # Grant execution permissions and compile the APK
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Save the path to the generated APK for the release step
          APK_PATH=$(find "$GRADLE_DIR" -name "app-debug.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Create GitHub Release & Upload APK (Bypasses 500MB Limit)
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.gradle_build.outputs.apk_path }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false