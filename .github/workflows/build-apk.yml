name: Cloud APK Compiler

on:
  push:
    tags:
      - 'v*' # Triggers the build whenever you push a tag like v1.0, v1.0.1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the runner permission to create a release

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Inject Production AdMob App ID securely
        env:
          REAL_ADMOB_ID: ${{ secrets.ADMOB_APP_ID }}
        run: |
          # Swap the placeholder with the secure environment secret inside the Manifest
          sed -i "s/ADMOB_APP_ID_PLACEHOLDER/$REAL_ADMOB_ID/g" android/app/src/main/AndroidManifest.xml

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Install Dependencies & Build Web Layer
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npm run build

      - name: Capacitor Sync
        run: |
          npx capacitor sync android

      - name: Compile Debug APK and Release AAB via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      - name: Create GitHub Release & Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false